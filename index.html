<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>OpenMovieDB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container" id="header-title">
            <h1>OpenMovieDB</h1>
        </div>
        <div class="container" id="header-form">
            <form id="form">
                <input type="text" class="mov-search" id="search-box" placeholder="Search for a movie...">
                <button type="submit" class="mov-search">Search</button>
            </form>
        </div>
        <div id="header-nav">
            <!-- Top Navigation Bar - Not In Use -->
        </div>

    </header>
    <main>
        <div class="container" id="nav-sidebar">
            <!-- Navigation Sidebar -->
            <ul id="nav-list">
                <li>Top Movies</li>
                <li>Recent Releases</li>
                <li>Upcoming Movies</li>
                <li>Action Movies</li>
                <li>Comedy Movies</li>
                <li>Horror Movies</li>
                <li>Documentaries</li>
            </ul>
        </div>
        <div class="container" id="main-content">
            <div id="welcome-txt">
                <p>Welcome to OpenMovieDB. Explore our extensive database of movies.</p>
                <p>Browse through our catalogue and go down the rabbit hole of cinema today!</p>
            </div>
            <hr>
            <!-- Movie List -->
            <div id="movie-list">

            </div>
        </div>
    </main>
    <footer>
    </footer>
    <script src="script.js"></script>
</body>
</html>
