<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>OpenMovieDB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="wrapper">
            <div class="container" id="header-title">
                <h1>OpenMovieDB</h1>
            </div>
            <div class="container" id="header-search-bar">
                    <input type="text" id="search-box" placeholder="Search for a movie...">
                    <button type="button" id="search-btn">Search</button>
            </div>
        </div>

    </header>
    <main>
        <div class="container" id="main-content">
            <div id="welcome-txt">
                <p>Welcome to OpenMovieDB. Explore our extensive database of movies.
                <br>Browse through our catalogue and go down the rabbit hole of cinema today!</p>
            </div>
            <hr>
            <!-- Movie Details -->
            <div id="movie-result">
            </div>
        </div>
    </main>
    <footer>
    </footer>
    <script src="script.js"></script>
</body>
</html>
